# History Service Configuration
quarkus.http.port=8083
quarkus.grpc.server.port=9003

# PostgreSQL/TimescaleDB Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=trademesh
quarkus.datasource.password=trademesh
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/trademesh

# RabbitMQ Configuration
mp.messaging.incoming.market-prices.connector=smallrye-rabbitmq
mp.messaging.incoming.market-prices.exchange.name=market-prices
mp.messaging.incoming.market-prices.exchange.type=fanout
mp.messaging.incoming.market-prices.queue.name=history-archive-queue

# Database Migration
quarkus.hibernate-orm.database.generation=update

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317

# MicroProfile Health
quarkus.smallrye-health.root-path=/health
