# History Service Configuration
quarkus.http.port=8083
quarkus.grpc.server.port=9003

# PostgreSQL/TimescaleDB Configuration (DevServices handle this in dev/test)
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://timescaledb:5432/trademesh}
%prod.quarkus.datasource.username=${vault:secret/history-service/db:username}
%prod.quarkus.datasource.password=${vault:secret/history-service/db:password}

# HashiCorp Vault Configuration
%prod.quarkus.vault.url=${VAULT_URL:http://localhost:8200}
%prod.quarkus.vault.authentication.client-token=${VAULT_TOKEN:root}
quarkus.vault.kv-secret-engine-mount-path=secret

# RabbitMQ Configuration
rabbitmq-host=localhost
rabbitmq-port=5672
quarkus.rabbitmq.devservices.enabled=false
mp.messaging.incoming.market-prices.connector=smallrye-rabbitmq
mp.messaging.incoming.market-prices.exchange.name=market-prices
mp.messaging.incoming.market-prices.exchange.type=fanout
mp.messaging.incoming.market-prices.queue.name=history-archive-queue
%prod.mp.messaging.connector.smallrye-rabbitmq.host=rabbitmq
%prod.mp.messaging.connector.smallrye-rabbitmq.username=${vault:secret/common/rabbitmq:username}
%prod.mp.messaging.connector.smallrye-rabbitmq.password=${vault:secret/common/rabbitmq:password}

# OpenShift Deployment Configuration
%prod.quarkus.kubernetes.resources.limits.memory=768Mi
%prod.quarkus.kubernetes.resources.requests.memory=384Mi
%prod.quarkus.kubernetes.resources.limits.cpu=500m
%prod.quarkus.kubernetes.resources.requests.cpu=100m
quarkus.openshift.build-strategy=docker

# Database Migration
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.flyway.schemas=public

# TimescaleDB DevServices Image
quarkus.datasource.devservices.image-name=postgres:16-alpine

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317

# MicroProfile Health
quarkus.smallrye-health.root-path=/health
