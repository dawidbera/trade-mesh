# History Service Configuration
quarkus.http.port=8083
quarkus.grpc.server.port=9003

# PostgreSQL/TimescaleDB Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://postgresql:5432/trademesh}
quarkus.datasource.username=${vault:secret/history-service/db:username}
quarkus.datasource.password=${vault:secret/history-service/db:password}

# HashiCorp Vault Configuration
quarkus.vault.url=${VAULT_URL:http://localhost:8200}
quarkus.vault.authentication.client-token=${VAULT_TOKEN:root}
quarkus.vault.kv-secret-engine-mount-path=secret

# RabbitMQ Configuration
mp.messaging.incoming.market-prices.connector=smallrye-rabbitmq
mp.messaging.incoming.market-prices.exchange.name=market-prices
mp.messaging.incoming.market-prices.exchange.type=fanout
mp.messaging.incoming.market-prices.queue.name=history-archive-queue
mp.messaging.connector.smallrye-rabbitmq.host=rabbitmq

# OpenShift Deployment Configuration
quarkus.kubernetes.resources.limits.memory=768Mi
quarkus.kubernetes.resources.requests.memory=384Mi
quarkus.kubernetes.resources.limits.cpu=500m
quarkus.kubernetes.resources.requests.cpu=100m
quarkus.openshift.build-strategy=docker

# Database Migration
quarkus.hibernate-orm.database.generation=update

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317

# MicroProfile Health
quarkus.smallrye-health.root-path=/health
