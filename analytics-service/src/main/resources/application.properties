# Analytics Service Configuration
quarkus.http.port=8082
quarkus.grpc.server.port=9002

# gRPC Client for Market Data Service
quarkus.grpc.clients.market.host=localhost
quarkus.grpc.clients.market.port=9001

# Redis Configuration for Indicator Storage
quarkus.redis.hosts=redis://localhost:6379

# RabbitMQ Configuration
mp.messaging.incoming.market-prices.connector=smallrye-rabbitmq
mp.messaging.incoming.market-prices.exchange.name=market-prices
mp.messaging.incoming.market-prices.exchange.type=fanout
mp.messaging.incoming.market-prices.queue.name=analytics-price-queue

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317

# MicroProfile Health
quarkus.smallrye-health.root-path=/health
