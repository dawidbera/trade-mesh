# Gateway Service Configuration
quarkus.http.port=8080
quarkus.grpc.server.port=9000

# gRPC Client Configurations (Default to localhost for dev/test)
quarkus.grpc.clients.market.host=localhost
quarkus.grpc.clients.market.port=9001
quarkus.grpc.clients.analytics.host=localhost
quarkus.grpc.clients.analytics.port=9002
quarkus.grpc.clients.history.host=localhost
quarkus.grpc.clients.history.port=9003

# OpenShift specific gRPC host overrides
%prod.quarkus.grpc.clients.market.host=market-data-service
%prod.quarkus.grpc.clients.analytics.host=analytics-service
%prod.quarkus.grpc.clients.history.host=history-service

# OpenShift Deployment Configuration
%prod.quarkus.openshift.route.expose=true
%prod.quarkus.kubernetes.resources.limits.memory=1024Mi
%prod.quarkus.kubernetes.resources.requests.memory=512Mi
%prod.quarkus.kubernetes.resources.limits.cpu=1000m
%prod.quarkus.kubernetes.resources.requests.cpu=200m
quarkus.openshift.build-strategy=docker

# RabbitMQ Configuration for GraphQL Subscriptions
mp.messaging.incoming.market-prices.connector=smallrye-rabbitmq
mp.messaging.incoming.market-prices.exchange.name=market-prices
mp.messaging.incoming.market-prices.exchange.type=fanout
mp.messaging.incoming.market-prices.queue.name=gateway-price-subscription-queue
%prod.mp.messaging.connector.smallrye-rabbitmq.host=rabbitmq

# OIDC (Keycloak) Configuration
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8180/realms/trademesh}
%prod.quarkus.oidc.client-id=trademesh-gateway
%prod.quarkus.oidc.credentials.secret=${KEYCLOAK_SECRET:secret}
%prod.quarkus.oidc.application-type=service
# Disable OIDC in dev/test for easier unit testing of resolvers
quarkus.oidc.enabled=false
%prod.quarkus.oidc.enabled=true

# HashiCorp Vault Configuration
%prod.quarkus.vault.url=${VAULT_URL:http://localhost:8200}
%prod.quarkus.vault.authentication.client-token=${VAULT_TOKEN:root}
quarkus.vault.kv-secret-engine-mount-path=secret

# GraphQL Configuration
quarkus.smallrye-graphql.path=/graphql
quarkus.smallrye-graphql.ui.enable=true

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317
