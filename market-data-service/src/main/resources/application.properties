# Market Data Service Configuration
quarkus.http.port=8081
quarkus.grpc.server.port=9001

# Redis Configuration
quarkus.redis.hosts=redis://redis:6379

# OpenShift Deployment Configuration
quarkus.kubernetes.resources.limits.memory=512Mi
quarkus.kubernetes.resources.requests.memory=256Mi
quarkus.kubernetes.resources.limits.cpu=500m
quarkus.kubernetes.resources.requests.cpu=100m
quarkus.openshift.build-strategy=docker

# RabbitMQ Configuration
mp.messaging.outgoing.market-prices.connector=smallrye-rabbitmq
mp.messaging.outgoing.market-prices.exchange.name=market-prices
mp.messaging.outgoing.market-prices.exchange.type=fanout

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger-collector:4317

# HashiCorp Vault Configuration
quarkus.vault.url=${VAULT_URL:http://localhost:8200}
quarkus.vault.authentication.client-token=${VAULT_TOKEN:root}
quarkus.vault.kv-secret-engine-mount-path=secret

# MicroProfile Health
quarkus.smallrye-health.root-path=/health
